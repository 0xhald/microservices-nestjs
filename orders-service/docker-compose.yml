services:
  orders-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orders-service
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: orders
      NATS_SERVER: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: orders-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nats:
    image: nats:latest
    container_name: orders-nats
    command: "-js -m 8222"
    ports:
      - "14222:4222"
      - "14822:8222"
    restart: unless-stopped

volumes:
  db_data:
